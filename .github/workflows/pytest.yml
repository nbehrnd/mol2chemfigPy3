
# This workflow will install Python dependencies and run tests with a variety of Python versions
# For easier maintenance, the matrix approach is retained.  To reduce the
# the likelyhood of failure while interacting with NIH PubChem servers
# which limit the number of requests per time period, it however is set
# up as a sequential workflow.  There is a complementary rate limiting
# throttle in `tests/test_read_pubchem.py`.

name: CI latest Python interpreter

on:
  push:
    branches: [ "main" ]
    paths: [ "tests/*.py", "mol2chemfigPy3/*.py", "setup.py", ".github/workflows/pytest.yml" ]
  pull_request:
    branches: [ "main" ]
    paths: [ "tests/*.py", "mol2chemfigPy3/*.py", "setup.py", ".github/workflows/pytest.yml" ]
  workflow_dispatch:

permissions:
  contents: read
  issues: none

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.x"]
      max-parallel: 1  # to prevent parallelism which isn't good vs pubchem requests

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pytest
        pip install -r requirements.txt
        pip install -r other-requirements.txt
        pip install .

    - name: Test with pytest
      run: |
        pytest

